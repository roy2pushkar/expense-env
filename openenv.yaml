name: expense-env
description: Smart Expense Manager environment

endpoints:
  reset: /reset
  step: /step
  state: /state

actions:
  type: string
  values:
    - spend
    - save
    - invest

observation:
  balance: int
  savings: int
  step: int

reward:
  type: float
  range: [0.0, 1.0]

tasks:
  - name: easy
    description: Save at least 300
  - name: medium
    description: Save at least 700
  - name: hard
    description: Save at least 1200